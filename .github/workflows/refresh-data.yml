name: Refresh quest data

on:
  schedule:
    # 06:00 UTC daily
    - cron: '0 6 * * *'
  workflow_dispatch: {} # lets you trigger a manual run from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Re-scrape quest data from arcraiders.wiki
        run: node scrape.js

      - name: Refresh item icons
        run: node add-item-icons.js

      - name: Refresh trader icons
        run: node add-trader-icons.js

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quests.json item-icons.json trader-icons.json
          git diff --cached --quiet || git commit -m "Auto-refresh quest data from arcraiders.wiki"
          git push
